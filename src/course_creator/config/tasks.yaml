course_creation_task:
  description: >
    Составь подробный учебный курс по теме "{topic}" для одной команды ИТ-специалистов
    (аналитиков и разработчиков). При анализе структуры курса в названии темы игнорируй то, что идёт после слов "Ингос". 
    Это частный случай для компании Ингосстрах и этой информации нет в открытом доступе.

    ТРЕБОВАНИЯ К КУРСУ:

    1. СТРУКТУРА КУРСА:
       - Архитектура реализации

        0) Принципы, какие ещё есть смешные названия: солид SOLID, драй DRY, кисс, ягни, CRP, REP, LoD, ADP (циклы - наше любимое в ингосе), SDP (дба следят), SoC. Ингос: что соблюдается, что мы не соблюдаем, (но по-вашему должны) и порой огребаем. Цена?

        1) Стили: Монолит, модульный монолит, микросервисы. Методологии разработки: Layered vs Hexagonal. Сроки поставки и риски. Ингос: Новые схемы. Что выносим сразу, что оставляем. AISACS

        2) Паттерны взаимодействия - асинхрон, синхрон, транзакции и прочие особые вещи. Ингос: наши реализации о которых знаем.

        3) Многопоточность и как с ней работать и общие проблемы. Ингос: Наши реализации и что ещё стоит.

        4) Нефункциональные требования с точки зрения архитектуры кода и проработка с заказчиками. Масштабируемость, надёжность, согласованность данных. Ингос: Разбор примера сервисов с определёнными НФТ. МПСЖ и его КК с телефонами. Квартирный вопрос 2.0

        5) Продолжение методологий: DDD (проектирование бизнес-логики), CQS/CQRS(производительность), TDD/BDD (разработка), API first. Ингос: Где использовать в ингосе, а где лишнее.

        6) Управление общими данными. Источник правды, идемпотентность, жизненный цикл, версионирование, согласованность, конкуренция. Ингос: Рассмотреть по пунтам клиентов и сравнить с заявлениями (договор С).

         

        - Архитектура решений

        0) Подсчёт и планирование нагрузки. Ингос: как заказать ресурсы под себя, где нужны определённые лицензии.

        1) Трейдоффы. Треугольник "Быстро - Дёшево - Надёжно". Ингос: разобрать общую сетевую схему как пример.

        2) Нефункциональные требования с точки зрения архитектуры приложения. Производительность, доступность, надёжность, стоимость, безопасность, масштабируемость, сопровождаемость.

        3) Стратегии интеграции. Синк, асинк, файлы.

        4) Границы (Bounded Context как в ддд). Ингос: с4 схемы, примеры в ингосе.

        5) Эволюция и как сделать не так больно изменениями. Арх. метрики и миграция функционала. Ингос: наш подход к разрезанию монолита и к нашим ограничениям на оракл и прочее.

        6) ADR. С чего начинаем и почему выбрали год назад именно это. (ADR + risks + nfr + Evolution Plan) Ингос: Разбор ингосовского некоего архкома.

    2. СОДЕРЖАНИЕ КАЖДОГО МОДУЛЯ:
       - Название модуля
       - Цели модуля (что студент сможет делать после изучения)
       - Теоретическая часть (ключевые концепции, термины, подходы)
       - Практическая часть (примеры, кейсы, задания для самостоятельной работы)
       - Контрольные вопросы для самопроверки

    3. ФОРМАТ:
       - Язык: профессиональный, но доступный для специалистов с базовыми знаниями IT
       - Используй списки, подзаголовки, выделение ключевых терминов
       - Добавь примеры кода (где уместно) с пояснениями
       - Опиши, какие диаграммы/иллюстрации нужны для каждого раздела

    4. КРИТЕРИИ КАЧЕСТВА:
       - Информация должна быть актуальной (проверь по последним источникам)
       - Курс должен давать практические навыки, а не только теорию
       - Материал должен быть полезен и аналитикам, и разработчикам
       - Объём курса должен быть таким, чтобы на каждую тему тратилось не более 10 минут для простых тем и 20 для сложных

    Используй поисковые инструменты (SerperDevTool) для поиска
    актуальных источников, лучших практик и примеров по теме "{topic}".

  expected_output: >
    Полный учебный курс в формате Markdown со структурой,
    описанной выше. Файл должен называться "course.md" и содержать
    все модули, примеры, вопросы и рекомендации по иллюстрациям.

  agent: researcher
  output_file: output/course_raw.md

analyst_review_task:
  description: >
    Проведи рецензирование учебного курса по теме "{topic}" с точки зрения
    ПОЛЕЗНОСТИ ДЛЯ СИСТЕМНЫХ И БИЗНЕС-АНАЛИТИКОВ.

    Тебе предоставлен черновик курса (файл output/course_raw.md).

    Проанализируй курс по следующим критериям:

    1. АНАЛИТИЧЕСКАЯ ЦЕННОСТЬ:
       - Какие разделы действительно помогут аналитикам в их работе?
       - Какие темы раскрыты недостаточно или излишне подробно?
       - Добавь предложения по усилению аналитической составляющей

    2. ПРАКТИЧЕСКАЯ ПРИМЕНИМОСТЬ:
       - Есть ли реальные кейсы из области сбора требований, документирования?
       - Присутствуют ли примеры диаграмм (BPMN, UML, ERD) и их интерпретация?
       - Поможет ли курс аналитику в работе с API, БД, прототипами, NRF (нефункциональными требованиями)?

    3. ТОЧНОСТЬ ТЕРМИНОЛОГИИ:
       - Соответствует ли терминология стандартам (SWEBOK, BABOK)?
       - Нет ли противоречий или неоднозначных формулировок?

    4. ОБЩАЯ ОЦЕНКА И РЕКОМЕНДАЦИИ:
       - Оцени курс по шкале 1-10
       - Дай конкретные рекомендации по улучшению (3-5 пунктов)
       - Укажи, какие разделы можно убрать, а какие — расширить

    ФОРМАТ ОТВЕТА:
    - Аналитическая ценность: (развёрнуто)
    - Практическая применимость: (развёрнуто)
    - Точность терминологии: (замечания или OK)
    - Рекомендации по улучшению: (список)
    - Итоговая оценка: X/10

  expected_output: >
    Подробная рецензия в формате Markdown с анализом по указанным
    критериям и конкретными рекомендациями. Файл должен называться
    "analyst_review.md".

  agent: analyst_reviewer
  output_file: output/analyst_review.md
  
developer_review_task:
  description: >
    Проведи рецензирование учебного курса по теме "{topic}" с точки зрения
    ПОЛЕЗНОСТИ ДЛЯ РАЗРАБОТЧИКОВ (backend, data engineers, software engineers).

    Тебе предоставлен черновик курса (файл output/course_raw.md).

    Проанализируй курс по следующим критериям:

    1. ТЕХНИЧЕСКАЯ ДОСТОВЕРНОСТЬ:
       - Корректны ли примеры кода (синтаксис, логика, best practices)?
       - Соответствуют ли рекомендации современному технологическому стеку?
       - Нет ли устаревших или опасных практик?

    2. ПОЛЕЗНОСТЬ ДЛЯ РАЗРАБОТЧИКОВ:
       - Какие разделы дают реальные практические навыки?
       - Достаточно ли примеров кода и готовых сниппетов?
       - Присутствуют ли практические задания, которые можно легко выполнить или обсудить с командой?

    3. ПОНЯТНОСТЬ ОБЪЯСНЕНИЙ:
       - Легко ли понять сложные концепции по тексту?
       - Нужны ли дополнительные диаграммы или визуализации?
       - Нет ли "воды" или излишней теории?

    4. ОБЩАЯ ОЦЕНКА И РЕКОМЕНДАЦИИ:
       - Оцени курс по шкале 1-10
       - Дай конкретные рекомендации по улучшению (3-5 пунктов)
       - Укажи, где не хватает примеров кода или практических заданий

    ФОРМАТ ОТВЕТА:
    - Техническая достоверность: (развёрнуто)
    - Полезность для разработчиков: (развёрнуто)
    - Понятность объяснений: (развёрнуто)
    - Рекомендации по улучшению: (список)
    - Итоговая оценка: X/10

  expected_output: >
    Подробная рецензия в формате Markdown с анализом по указанным
    критериям и конкретными рекомендациями. Файл должен называться
    "developer_review.md".

  agent: developer_reviewer
  output_file: output/developer_review.md
  
illustration_task:
  description: >
    На основе финальной версии учебного курса по теме "{topic}"
    создай ВИЗУАЛЬНЫЕ МАТЕРИАЛЫ (диаграммы и иллюстрации).

    Тебе предоставлен доработанный курс (после учёта рецензий).
    Твоя задача — для каждого логического раздела предложить
    подходящий тип визуализации.

    ТИПЫ ВИЗУАЛИЗАЦИЙ:

    1. ДИАГРАММЫ (код Mermaid):
       - Блок-схемы процессов и алгоритмов
       - Диаграммы последовательности (sequence diagrams)
       - Архитектурные схемы (component diagrams)
       - ER-диаграммы для работы с БД
       - Графики зависимостей и связей

    2. СХЕМЫ И ТАБЛИЦЫ:
       - Сравнительные таблицы концепций
       - Схемы классификации и иерархии
       - Таймлайны развития технологий

    3. ПОИСК ИЛЛЮСТРАЦИЙ:
       - Предложи ключевые слова для поиска иллюстраций (например, "modern data pipeline architecture flat design")
       - Укажи желаемый стиль (технический, корпоративный, инфографика)
       - Дай рекомендации по источникам (freepik, icons8, unDraw)

    ТРЕБОВАНИЯ:

    Для каждого модуля/важного раздела укажи:
    - Название раздела
    - Рекомендуемый тип визуализации
    - Код диаграммы Mermaid (если применимо)
    - Ключевые слова для поиска (если не Mermaid)
    - Пояснение, почему эта визуализация поможет пониманию

    Итогом должен быть файл, который можно будет интегрировать
    в основной курс (вставки Mermaid и ссылки на иллюстрации).

  expected_output: >
    Файл в формате Markdown, содержащий для каждого раздела курса
    рекомендации по визуализации с готовым кодом Mermaid.
    Файл должен называться "illustrations.md".

  agent: illustrator
  output_file: output/illustrations.md
  
  
final_assembly_task:
  description: >
    Собери финальную версию учебного курса по теме "{topic}".

    У тебя есть:
    - Основной текст курса (course_raw.md)
    - Рецензия аналитика (analyst_review.md)
    - Рецензия разработчика (developer_review.md)
    - Визуализации (illustrations.md)

    На основе этих материалов создай итоговый документ, который:
    1. Включает доработанный текст курса с учётом рецензий
    2. Содержит диаграммы Mermaid в соответствующих местах
    3. Имеет профессиональное оформление и структуру
    4. Готов к публикации в корпоративном портале или Wiki

  expected_output: >
    Финальная версия учебного курса в формате Markdown, 
    готовый к использованию. Файл должен называться
    "final_course_ready.md".

  agent: researcher  # или создайте отдельного агента-сборщика
  output_file: output/final_course_ready.md